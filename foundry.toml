[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "none"
ffi = false
fs_permissions = [{ access = "read", path = "./out" }]

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[fuzz]
runs = 512
max_test_rejects = 100_000

[invariant]
runs = 256
depth = 64
fail_on_revert = false

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[etherscan]
# Placeholder; Arc explorer verification wired later.

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
